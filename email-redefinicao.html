<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinição de Senha</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333333;
            margin: 0;
            padding: 0;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #dddddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1); /* Adicionando elevação */
        }
        .header {
            text-align: center;
            padding: 10px 0;
            background-color: #6d502d; /* Roxo escuro */
            color: #ffffff;
            border-radius: 16px; /* Todas as bordas arredondadas em 16px */
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .content p {
            font-size: 16px;
            color: #555555;
            line-height: 1.5;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: #ffffff; /* Cor do texto branca */
            background-color: #85643B; /* Roxo médio */
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #6d502d; /* Roxo escuro */
        }
        .note {
            font-size: 12px;
            color: #888888; /* Cor mais clara */
            font-style: italic;
            margin-top: 10px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777777;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <h1>Redefinição de Senha</h1>
        </div>
        <div class="content">
            <p>Olá,</p>
            <p>Recebemos uma solicitação para redefinir a sua senha. Clique no botão abaixo para continuar com o processo.</p>
            <a href="{{ .ConfirmationURL }}reset-password" class="button">Redefinir Senha</a>
            <p class="note">Se você não solicitou esta alteração, por favor ignore este e-mail.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 Maindx. Todos os direitos reservados.</p>
        </div>
    </div>

    <script>
        // Verifica se o link do botão está presente e aplica a cor branca ao texto
        document.addEventListener("DOMContentLoaded", function() {
            const button = document.querySelector(".button");
            if (button && button.getAttribute("href")) {
                button.style.color = "#ffffff"; // Garante que a cor do texto será branca
            }
        });
    </script>
</body>
</html>
